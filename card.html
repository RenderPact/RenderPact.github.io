<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>RenderPact — Your Membership Card</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500&family=Cinzel:wght@400;600&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      background: #080808;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: 'DM Sans', sans-serif;
      padding: 40px 20px;
      position: relative;
      overflow: hidden;
    }

    body::before {
      content: '';
      position: fixed; inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
      background-size: 180px;
      pointer-events: none;
      opacity: .6;
      z-index: 0;
    }

    body::after {
      content: '';
      position: fixed;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      width: 600px; height: 600px;
      background: radial-gradient(ellipse, rgba(201,148,42,0.07) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }

    .page-title {
      position: relative; z-index: 1;
      font-family: 'Cinzel', serif;
      font-size: 11px;
      letter-spacing: .22em;
      color: rgba(201,148,42,0.5);
      text-transform: uppercase;
      margin-bottom: 32px;
      animation: fadeUp .5s ease both;
    }

    .card {
      position: relative; z-index: 1;
      width: 480px;
      height: 270px;
      border-radius: 18px;
      overflow: hidden;
      animation: fadeUp .6s .1s ease both;
    }

    .card-bg {
      position: absolute; inset: 0;
      background: linear-gradient(135deg, #0A0A08 0%, #111008 50%, #0C0B06 100%);
    }

    .card-bg::before {
      content: '';
      position: absolute; inset: 0;
      background:
        radial-gradient(ellipse at 95% 5%, rgba(201,148,42,0.22) 0%, transparent 45%),
        radial-gradient(ellipse at 5% 95%, rgba(201,148,42,0.07) 0%, transparent 40%);
    }

    .card-shimmer {
      position: absolute;
      top: 0; left: -100%;
      width: 55%; height: 100%;
      background: linear-gradient(105deg, transparent 40%, rgba(201,168,76,0.07) 50%, rgba(255,220,100,0.13) 55%, rgba(201,168,76,0.05) 60%, transparent 70%);
      animation: shimmer 4s 1s ease-in-out infinite;
      pointer-events: none;
    }

    @keyframes shimmer {
      0%   { left: -100%; }
      50%  { left: 120%; }
      100% { left: 120%; }
    }

    .card-border {
      position: absolute; inset: 0;
      border-radius: 18px;
      border: 1px solid rgba(201,148,42,0.38);
      pointer-events: none;
    }

    .card-border::after {
      content: '';
      position: absolute;
      inset: 2px;
      border-radius: 16px;
      border: 1px solid rgba(201,148,42,0.07);
    }

    .corner {
      position: absolute;
      width: 18px; height: 18px;
      border-color: rgba(201,148,42,0.6);
      border-style: solid;
    }
    .corner-tl { top: 12px; left: 12px; border-width: 1.5px 0 0 1.5px; }
    .corner-tr { top: 12px; right: 12px; border-width: 1.5px 1.5px 0 0; }
    .corner-bl { bottom: 12px; left: 12px; border-width: 0 0 1.5px 1.5px; }
    .corner-br { bottom: 12px; right: 12px; border-width: 0 1.5px 1.5px 0; }

    .sparkle {
      position: absolute;
      color: rgba(201,148,42,0.5);
      animation: twinkle 3s ease-in-out infinite;
      pointer-events: none;
      z-index: 2;
    }

    @keyframes twinkle {
      0%, 100% { opacity: .2; transform: scale(1); }
      50% { opacity: .9; transform: scale(1.4); }
    }

    .card-content {
      position: relative; z-index: 1;
      padding: 22px 28px 22px;
      height: 100%;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
    }

    .card-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .card-brand {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .card-brand img {
      width: 44px; height: 44px;
      object-fit: contain;
      filter: drop-shadow(0 0 10px rgba(201,148,42,0.4));
    }

    .card-brand-name {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 30px;
      letter-spacing: .1em;
      line-height: 1;
    }

    .card-brand-name .white { color: #F0EDE6; }
    .card-brand-name .gold  {
      background: linear-gradient(135deg, #E8B84B, #C9942A);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .card-type {
      font-family: 'Cinzel', serif;
      font-size: 8.5px;
      letter-spacing: .18em;
      color: rgba(201,148,42,0.42);
      text-align: right;
      line-height: 1.6;
      text-transform: uppercase;
    }

    .card-middle {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .card-username-label {
      font-family: 'Cinzel', serif;
      font-size: 8px;
      letter-spacing: .2em;
      color: rgba(201,148,42,0.38);
      text-transform: uppercase;
    }

    .card-username {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 40px;
      letter-spacing: .04em;
      color: #F0EDE6;
      line-height: 1;
    }

    .card-bottom {
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
    }

    .card-stats {
      display: flex;
      gap: 32px;
    }

    .card-stat {
      display: flex;
      flex-direction: column;
      gap: 3px;
    }

    .card-stat-label {
      font-size: 8px;
      letter-spacing: .16em;
      text-transform: uppercase;
      color: rgba(201,148,42,0.36);
    }

    .card-stat-value {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 16px;
      letter-spacing: .08em;
      color: rgba(232,185,75,0.85);
    }

    .card-chip {
      width: 36px; height: 28px;
      border-radius: 4px;
      background: linear-gradient(135deg, rgba(201,148,42,0.22), rgba(201,148,42,0.1));
      border: 1px solid rgba(201,148,42,0.25);
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      grid-template-rows: 1fr 1fr 1fr;
      gap: 2px;
      padding: 3px;
    }

    .chip-cell {
      background: rgba(201,148,42,0.16);
      border-radius: 1px;
    }

    .hint {
      position: relative; z-index: 1;
      margin-top: 22px;
      font-size: 12px;
      color: rgba(136,128,120,0.5);
      letter-spacing: .06em;
      text-align: center;
      animation: fadeUp .6s .4s ease both;
    }

    .hint span {
      display: inline-block;
      margin-top: 5px;
      font-size: 10px;
      color: rgba(201,148,42,0.33);
      letter-spacing: .12em;
      text-transform: uppercase;
    }

    .story-link {
      position: relative; z-index: 1;
      margin-top: 18px;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 10px 24px;
      border: 1px solid rgba(201,148,42,0.2);
      border-radius: 100px;
      text-decoration: none;
      color: rgba(201,148,42,0.6);
      font-size: 12px;
      letter-spacing: .1em;
      text-transform: uppercase;
      transition: all .2s;
      animation: fadeUp .6s .5s ease both;
    }

    .story-link:hover {
      border-color: rgba(201,148,42,0.55);
      color: rgba(232,185,75,0.9);
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(14px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @media (max-width: 520px) {
      .card { width: 340px; height: 192px; }
      .card-brand-name { font-size: 22px; }
      .card-username { font-size: 30px; }
      .card-content { padding: 16px 18px; }
      .card-brand img { width: 34px; height: 34px; }
    }
  </style>
</head>
